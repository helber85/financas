{% load static %}
<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Despesas</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>

<body class="min-h-screen bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-300">

<!-- NAVBAR -->
<nav class="bg-white dark:bg-gray-800 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2 text-base sm:text-lg font-semibold">
            <i class="bi bi-wallet2"></i>
            <span class="hidden sm:inline">Finanças Pessoais</span>
            <span class="sm:hidden">Finanças</span>
        </div>

        <div class="flex items-center gap-4">
            <button id="themeSwitch" class="text-xl">
                <i id="themeIcon" class="bi bi-moon-stars-fill"></i>
            </button>
            <a href="{% url 'autenticacao_app:logout' %}" id="logout" class="text-2xl">
                <i id="logoutIcon" class="bi bi-box-arrow-right"></i>
            </a>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-6">

    <!-- DASHBOARD -->
    <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">

        <!-- Chart -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-4 sm:p-6 text-center">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 mb-4">
                <h5 class="font-semibold flex items-center gap-2 text-sm sm:text-base">
                    <i class="bi bi-pie-chart-fill"></i>
                    Despesas por Categoria
                </h5>

                <div class="flex gap-2">
                    <select id="yearFilter"
                        class="text-xs sm:text-sm px-2 py-1 rounded bg-gray-100 dark:bg-gray-700 w-full sm:w-auto">
                    </select>
                    <select id="monthFilter"
                        class="text-xs sm:text-sm px-2 py-1 rounded bg-gray-100 dark:bg-gray-700 w-full sm:w-auto">
                    </select>
                </div>
            </div>

            <div class="relative h-64 sm:h-80">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <!-- Total -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-6 flex flex-col justify-center text-center sm:text-left">
            <h5 class="font-semibold flex items-center justify-center text-center gap-2 mb-2">
                <i class="bi bi-currency-dollar"></i>
                Saldo Total
            </h5>
            <p id="totalExpenses" class="text-3xl sm:text-4xl font-bold break-words text-center">
                R$ 0,00
            </p>
        </div>

        <!-- Savings Chart -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-4 sm:p-6 text-center lg:col-span-2">
            <h5 class="font-semibold flex items-center justify-center gap-2 mb-4">
                <i class="bi bi-piggy-bank-fill"></i>
                Movimentação Poupança
            </h5>
            <div class="relative h-64 sm:h-80 w-full max-w-2xl mx-auto">
                <canvas id="savingsChart"></canvas>
            </div>
        </div>

    </section>

    <!-- TABELA -->
    <section>
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow overflow-hidden">

            <div class="px-4 sm:px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
                <h5 class="font-semibold flex items-center gap-2">
                    <i class="bi bi-list-ul"></i>
                    Últimas Despesas
                </h5>
                <input type="text" id="categorySearch" placeholder="Buscar categoria..."
                       class="w-full sm:w-auto px-3 py-2 text-sm rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- MOBILE CARD VIEW -->
            <div id="expenseCards" class="block md:hidden p-4 space-y-3"></div>

            <!-- DESKTOP TABLE -->
            <div class="w-full overflow-x-auto">
                <table class="min-w-[700px] w-full text-sm border-collapse">
                    <thead class="bg-gray-100 dark:bg-gray-700">
                        <tr>
                            <th class="text-left px-4 py-3 whitespace-nowrap">Descrição</th>
                            <th class="text-left px-4 py-3 whitespace-nowrap">Tipo</th>
                            <th class="text-left px-4 py-3 whitespace-nowrap">Valor</th>
                            <th class="text-left px-4 py-3 whitespace-nowrap">Categoria</th>
                            <th class="text-left px-4 py-3 whitespace-nowrap">Data</th>
                            <th class="text-left px-4 py-3 whitespace-nowrap">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="expenseTableBody"></tbody>
                </table>
            </div>

            <div id="emptyState"
                class="hidden text-center py-6 text-gray-500 dark:text-gray-400">
                <i class="bi bi-info-circle"></i>
                Nenhuma despesa cadastrada ainda.
            </div>
        </div>
    </section>

</main>

<!-- FAB -->
<button id="addExpenseBtn"
    class="fixed bottom-5 right-5 sm:bottom-6 sm:right-6 bg-blue-600 hover:bg-blue-700 text-white w-14 h-14 rounded-full shadow-xl flex items-center justify-center text-xl transition-all active:scale-95">
    <i class="bi bi-plus-lg"></i>
</button>

<!-- MODAL -->
<div id="expenseModal"
     class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">

    <div class="bg-white dark:bg-gray-800 w-full max-w-md rounded-2xl shadow-xl p-6 relative">

        <h5 id="expenseModalLabel" class="text-lg font-semibold mb-4">
            Adicionar Despesa
        </h5>

        <form id="expenseForm" class="space-y-4">

            <input type="hidden" id="expenseId">

            <div>
                <label class="block text-sm mb-1">Tipo</label>
                <select id="type" required
                        class="w-full px-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="despesa">Despesa</option>
                    <option value="receita">Receita</option>
                    <option value="+poupanca">+ Poupança</option>
                    <option value="-poupanca">- Poupança</option>
                </select>
            </div>

            <div>
                <label class="block text-sm mb-1">Descrição</label>
                <input type="text" id="description" required
                       class="w-full px-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm mb-1">Valor</label>
                <input type="number" id="amount" step="0.01"
                       class="w-full px-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm mb-1">Categoria</label>
                <select id="category"
                        class="w-full px-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option>Alimentação</option>
                    <option>Escola</option>
                    <option>Gasolina</option>
                    <option>Iptu</option>
                    <option>Lazer</option>
                    <option>Luz</option>
                    <option>Salario</option>
                    <option>Saúde</option>
                    <option>Sem Parar</option>
                    <option>Terapia</option>
                    <option>Veículo</option>
                    <option>Outros</option>
                </select>
            </div>

            <div>
                <label class="block text-sm mb-1">Data</label>
                <input type="date" id="date"
                       class="w-full px-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="flex flex-col sm:flex-row justify-end gap-2 pt-4">
                <button type="button"
                        onclick="document.getElementById('expenseModal').classList.add('hidden')"
                        class="px-4 py-2 rounded-lg bg-gray-300 dark:bg-gray-600 w-full sm:w-auto">
                    Cancelar
                </button>

                <button type="submit"
                        class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 w-full sm:w-auto">
                    Salvar
                </button>
            </div>

        </form>
    </div>
</div>

<script src="{% static 'financas_app/script.js' %}" type="module"></script>

</body>
</html>
